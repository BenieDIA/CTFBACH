<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Connexion - Sondages</title>

  <link rel="stylesheet" href="./public/css/login.css" />
</head>

<body>

  <div class="page">

    <div class="card">

      <div class="brand">
        <div class="brand-icon">

          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
          </svg>

        </div>

        <span class="brand-name">
          Sondages
        </span>
      </div>

      <h1 class="card-title">
        Connexion
      </h1>

      <p class="card-subtitle">
        Accédez à votre espace de sondages
      </p>

      <form>

        <div class="field">
          <label for="email">
            Adresse e-mail
          </label>

          <input
            id="email"
            type="email"
            placeholder="vous@exemple.com"
            required
          />
        </div>

        <div class="field">
          <label for="password">
            Mot de passe
          </label>

          <input
            id="password"
            type="password"
            placeholder="••••••••"
            required
          />
        </div>

        <a href="#" class="forgot">
          Mot de passe oublié ?
        </a>

        <button type="submit" class="btn-login">
          Se connecter
        </button>

      </form>

      <div class="divider">

        <div class="divider-line"></div>

        <span>ou</span>

        <div class="divider-line"></div>

      </div>

      <p class="register">
        Pas encore de compte ?
        <a href="#">
          Créer un compte
        </a>
      </p>

    </div>

  </div>

</body>
</html>
